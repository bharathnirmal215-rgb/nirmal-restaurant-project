<!DOCTYPE html>
<html>
<head>
    <title>Nirmal Restaurant</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f8f8f8;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        h1 {
            color: darkred;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            width: 200px;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🍽️ Nirmal Restaurant</h1>
    <h3>Delicious Food Menu</h3>

    <div class="menu">

        <div class="item">
            <img src="https://source.unsplash.com/200x150/?pizza">
            <p><b>Pizza</b></p>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/200x150/?burger">
            <p><b>Burger</b></p>
        </div>

        <div class="item">
            <img src="https://source.unsplash.com/200x150/?biryani">
            <p><b>Biryani</b></p>
        </div>

    </div>
</div>

</body>
</html>
